<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="日本歴史">
<title>通訳案内士 日本歴史 過去問</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f2f2f7;--card:#fff;--text:#1c1c1e;--sub:#8e8e93;
  --border:#e0e0e5;--accent:#007aff;--ok:#34c759;--ng:#ff3b30;
  --radius:12px
}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;
  background:var(--bg);color:var(--text);min-height:100dvh;
  padding-bottom:calc(1rem + env(safe-area-inset-bottom,0px))}
.scr{display:none;flex-direction:column;min-height:100dvh}
.scr.on{display:flex}

/* HOME */
.hd{background:var(--card);padding:1.25rem 1rem 1rem;border-bottom:.5px solid var(--border)}
.hd h1{font-size:22px;font-weight:700}
.hd p{font-size:15px;color:var(--sub);margin-top:3px}
.sec{padding:0 1rem;margin-top:1.25rem}
.sec-t{font-size:13px;font-weight:600;color:var(--sub);text-transform:uppercase;
  letter-spacing:.05em;margin-bottom:8px;padding:0 4px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.card{background:var(--card);border-radius:var(--radius);padding:12px 14px}
.card .l{font-size:13px;color:var(--sub);margin-bottom:2px}
.card .v{font-size:26px;font-weight:600}

/* year chips */
.yr-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.yr-row::-webkit-scrollbar{display:none}
.yr-chip{flex-shrink:0;padding:6px 14px;border-radius:20px;
  border:1.5px solid var(--border);background:var(--card);
  font-size:15px;font-weight:500;cursor:pointer;transition:.15s}
.yr-chip.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* mode */
.mode-list{display:flex;flex-direction:column;gap:8px}
.mode-btn{background:var(--card);border:none;border-radius:var(--radius);
  padding:14px 16px;text-align:left;cursor:pointer;display:flex;align-items:center;gap:12px}
.mode-btn .ico{width:36px;height:36px;border-radius:10px;background:var(--bg);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.mode-btn .ttl{font-size:17px;font-weight:600}
.mode-btn .dsc{font-size:13px;color:var(--sub);margin-top:2px}
.mode-btn.sel{outline:2px solid var(--accent)}
.row{display:flex;gap:8px;margin-top:1.5rem}
.btn{flex:1;border:none;border-radius:var(--radius);padding:14px;
  font-size:17px;font-weight:600;cursor:pointer}
.btn.primary{background:var(--accent);color:#fff}
.btn.outline{background:transparent;border:1.5px solid var(--accent);color:var(--accent)}

/* QUIZ */
.q-hd{background:var(--card);padding:.75rem 1rem;border-bottom:.5px solid var(--border);
  display:flex;align-items:center;gap:10px}
.q-back{background:none;border:none;font-size:17px;color:var(--accent);cursor:pointer;
  padding:2px 8px 2px 0}
.prog-w{flex:1}
.prog-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.prog-txt{font-size:13px;color:var(--sub);margin-top:4px;text-align:right}
.pts-badge{font-size:13px;font-weight:600;color:var(--accent);
  background:#e8f0fe;padding:3px 8px;border-radius:6px;white-space:nowrap}
.q-body{padding:1rem;flex:1;overflow-y:auto}
.q-meta{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.badge{font-size:12px;font-weight:600;padding:3px 8px;border-radius:6px}
.badge.yr{background:#f0f0f5;color:var(--sub)}
.badge.th{background:#e8f0fe;color:var(--accent)}
.q-txt{font-size:17px;line-height:1.65;margin-bottom:1.25rem}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);
  padding:14px 15px;text-align:left;font-size:16px;color:var(--text);
  cursor:pointer;transition:.15s;line-height:1.5;width:100%}
.opt:active{transform:scale(.98)}
.opt.ok{background:#e9faf0;border-color:var(--ok);color:#1a7a40;font-weight:600}
.opt.ng{background:#fff2f2;border-color:var(--ng);color:#c0392b}
.opt.show-ok{background:#e9faf0;border-color:var(--ok);color:#1a7a40}
.fb{margin-top:1rem;border-radius:var(--radius);padding:12px 14px;display:none}
.fb.on{display:block}
.fb.fb-ok{background:#e9faf0;border:1px solid var(--ok)}
.fb.fb-ng{background:#fff2f2;border:1px solid var(--ng)}
.fb-top{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.fb-lbl{font-size:16px;font-weight:700}
.fb-ok .fb-lbl{color:#1a7a40}
.fb-ng .fb-lbl{color:#c0392b}
.fb-exp{font-size:15px;color:#555;line-height:1.65}
.next{background:var(--text);color:var(--bg);border:none;border-radius:var(--radius);
  padding:.75rem;font-size:16px;font-weight:600;cursor:pointer;width:100%;
  margin-top:1rem;display:none}
.next.on{display:block}

/* RESULT */
#result{background:var(--bg);padding:1.5rem 1rem;gap:1rem}
.r-hero{text-align:center;padding:1rem 0}
.r-sc{font-size:52px;font-weight:700}
.r-lbl{font-size:15px;color:var(--sub)}
.r-msg{font-size:17px;margin-top:8px}
.r-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.r-card{background:var(--card);border-radius:var(--radius);padding:12px 14px;text-align:center}
.r-card .v{font-size:24px;font-weight:700}
.r-card .l{font-size:13px;color:var(--sub);margin-top:2px}
.hist-t{font-size:14px;font-weight:600;color:var(--sub);margin-bottom:8px}
.hist-list{display:flex;flex-direction:column;gap:6px;max-height:240px;overflow-y:auto}
.hi{display:flex;align-items:center;gap:8px;font-size:13px;
  padding:6px 8px;background:var(--card);border-radius:8px}
.hi-n{color:var(--sub);min-width:40px;font-size:12px}
.hi-q{flex:1;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hi-r{font-size:16px}
.r-row{display:flex;gap:8px}
.r-btn{flex:1;padding:.75rem;border-radius:var(--radius);
  font-size:16px;font-weight:600;cursor:pointer;border:none}
.r-btn.p{background:var(--accent);color:#fff}
.r-btn.s{background:transparent;border:1.5px solid var(--accent);color:var(--accent)}

/* ── FLAG ── */
.flag-btn{background:none;border:none;font-size:22px;cursor:pointer;padding:4px 8px;border-radius:8px;transition:.15s}
.flag-btn:active{transform:scale(.9)}
.flag-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.flag-badge{font-size:12px;font-weight:600;padding:2px 8px;border-radius:6px;background:#fff3e0;color:#e65100}

/* ── WIKI ── */
.wiki-btn{display:inline-flex;align-items:center;gap:4px;background:#f0f0f5;border:none;
  border-radius:8px;padding:5px 10px;font-size:13px;color:#007aff;cursor:pointer;margin-top:8px}
.wiki-btn:active{opacity:.7}

/* ── FLAG LIST ── */
#flagged{background:var(--bg);padding:1rem;flex-direction:column;gap:1rem}
.fl-header{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.fl-back{background:none;border:none;font-size:17px;color:var(--accent);cursor:pointer}
.fl-title{font-size:19px;font-weight:700}
.fl-empty{text-align:center;color:var(--sub);padding:3rem 1rem;font-size:17px}
.fl-item{background:var(--card);border-radius:var(--radius);padding:12px 14px;
  display:flex;align-items:flex-start;gap:10px}
.fl-item-q{flex:1;font-size:15px;color:var(--text);line-height:1.5}
.fl-item-meta{font-size:12px;color:var(--sub);margin-top:3px}
.fl-unflag{background:none;border:none;font-size:18px;cursor:pointer;flex-shrink:0;padding:2px}
.fl-start{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);
  padding:13px;font-size:17px;font-weight:600;cursor:pointer;width:100%}
</style>
</head>
<body>

<!-- FLAGGED -->
<div id="flagged" class="scr">
  <div class="fl-header">
    <button class="fl-back" onclick="goHome()">‹ 戻る</button>
    <span class="fl-title">🚩 フラグした問題</span>
  </div>
  <div id="fl-list"></div>
  <button class="fl-start" id="fl-start-btn" onclick="startFlagged()" style="display:none">フラグ問題を練習する</button>
</div>

<!-- HOME -->
<div id="home" class="scr on">
  <div class="hd">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <h1>日本歴史 過去問</h1>
        <p>全国通訳案内士試験 2019〜2025年度</p>
      </div>
      <button onclick="showFlagged()" style="background:#fff3e0;border:none;border-radius:10px;padding:8px 12px;font-size:13px;font-weight:600;color:#e65100;cursor:pointer">🚩 フラグ一覧</button>
    </div>
  </div>
  <div class="sec">
    <div class="sec-t">成績</div>
    <div class="grid2">
      <div class="card"><div class="l">正答率</div><div class="v" id="h-rate">—</div></div>
      <div class="card"><div class="l">累計回答</div><div class="v" id="h-total">0問</div></div>
      <div class="card"><div class="l">正解数</div><div class="v" id="h-ok">0</div></div>
      <div class="card"><div class="l">全問題数</div><div class="v" id="h-all">—</div></div>
    </div>
  </div>
  <div class="sec">
    <div class="sec-t">年度（複数選択可）</div>
    <div class="yr-row" id="yr-row"></div>
  </div>
  <div class="sec">
    <div class="sec-t">出題モード</div>
    <div class="mode-list">
      <button class="mode-btn sel" id="m-seq" onclick="selMode('seq')">
        <div class="ico">📋</div>
        <div><div class="ttl">順番に解く</div><div class="dsc">選択年度を古い順に</div></div>
      </button>
      <button class="mode-btn" id="m-rnd" onclick="selMode('rnd')">
        <div class="ico">🔀</div>
        <div><div class="ttl">ランダム出題</div><div class="dsc">シャッフルして出題</div></div>
      </button>
      <button class="mode-btn" id="m-wrg" onclick="selMode('wrg')">
        <div class="ico">❌</div>
        <div><div class="ttl">間違えた問題のみ</div><div class="dsc">苦手集中練習</div></div>
      </button>
    </div>
  </div>
  <div class="sec">
    <div class="row">
      <button class="btn primary" onclick="startQuiz()">スタート</button>
      <button class="btn outline" onclick="resetAll()">リセット</button>
    </div>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz" class="scr">
  <div class="q-hd">
    <button class="q-back" onclick="goHome()">‹ 戻る</button>
    <div class="prog-w">
      <div class="prog-bar"><div class="prog-fill" id="pfill" style="width:0%"></div></div>
      <div class="prog-txt" id="ptxt">0 / 0</div>
    </div>
    <div class="pts-badge" id="pts-b">3点</div>
    <button class="flag-btn" id="flag-btn" onclick="toggleFlag()" title="フラグ">☆</button>
  </div>
  <div class="q-body" id="q-body"></div>
</div>

<!-- RESULT -->
<div id="result" class="scr">
  <div class="r-hero">
    <div class="r-sc" id="r-sc">0</div>
    <div class="r-lbl">点 / <span id="r-max">0</span>点</div>
    <div class="r-msg" id="r-msg"></div>
  </div>
  <div class="r-grid">
    <div class="r-card"><div class="v" id="r-ok">0</div><div class="l">正解</div></div>
    <div class="r-card"><div class="v" id="r-ng">0</div><div class="l">不正解</div></div>
    <div class="r-card"><div class="v" id="r-rt">0%</div><div class="l">正答率</div></div>
    <div class="r-card"><div class="v" id="r-pt">0点</div><div class="l">獲得点</div></div>
  </div>
  <div>
    <div class="hist-t">解答履歴</div>
    <div class="hist-list" id="hist"></div>
  </div>
  <div class="r-row">
    <button class="r-btn p" onclick="startQuiz()">もう一度</button>
    <button class="r-btn s" onclick="goHome()">ホームへ</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// 問題データ
// yr=年度 theme=テーマ pts=配点 q=問題文
// opts=選択肢配列 ans=正答index(0始まり) exp=解説
// ═══════════════════════════════════════════════
const QS=[

// ════════════ 2025年度（30問） ════════════
{yr:2025,theme:"平泉",pts:3,
q:"中尊寺は奥州藤原氏の初代・藤原清衡が1105年に再興した天台宗の寺院である。清衡は1083年に起きた（　）に介入してきた源義家に協力し勢力を蓄えた。清原氏の内紛に始まる戦乱の名称はどれか。",
opts:["前九年合戦","後三年合戦","承平・天慶の乱","保元の乱"],ans:1,
exp:"後三年合戦（1083〜87年）は清原氏の内紛に源義家が介入した戦い。藤原清衡はこの戦いで義家に協力して勢力を伸ばし、奥州藤原氏の基礎を築いた。"},

{yr:2025,theme:"平泉",pts:3,
q:"中尊寺金色堂の螺鈿細工のおもな材料となるものはどれか。",
opts:["麝香（じゃこう）","花崗岩","水銀","夜光貝"],ans:3,
exp:"螺鈿は夜光貝・アワビ・蝶貝などの貝殻の内側の光沢ある部分を薄く削り、漆器などに嵌め込む技法。金色堂の内装を飾る代表的な工芸技法。"},

{yr:2025,theme:"平泉",pts:3,
q:"毛越寺の庭園は仏教思想の影響を受けた庭園様式として貴重である。平安〜鎌倉時代にかけて築造された、この庭園様式として正しいものはどれか。",
opts:["寝殿造庭園","浄土庭園","枯山水","大名庭園"],ans:1,
exp:"浄土庭園は阿弥陀如来の極楽浄土を地上に再現しようとした庭園様式。毛越寺（岩手県平泉町）の庭園は現存する最古の浄土庭園のひとつ。"},

{yr:2025,theme:"平泉",pts:4,
q:"義良親王は後醍醐天皇の皇子であり、後に即位して（　）となっている。空欄に入る天皇の名として正しいものはどれか。",
opts:["後村上天皇","長慶天皇","後小松天皇","後亀山天皇"],ans:0,
exp:"義良親王は後醍醐天皇の皇子。父の崩御後に南朝第2代天皇・後村上天皇として即位（在位1339〜68年）。"},

{yr:2025,theme:"平泉",pts:4,
q:"松尾芭蕉の平泉訪問に関する記述として正しいものを選びなさい。",
opts:["芭蕉は平泉訪問の様子を紀行文『笈の小文』にまとめている。","芭蕉の平泉訪問には弟子の与謝蕪村が同行していた。","芭蕉は平泉の高館で『啄木も庵はやぶらず夏木立』の句を詠んだ。","中尊寺金色堂を参拝した芭蕉は『五月雨の降りのこしてや光堂』の句を詠んだ。"],ans:3,
exp:"『五月雨の降りのこしてや光堂』は芭蕉が中尊寺金色堂を訪れ詠んだ句（『おくのほそ道』収録）。同書には高館で『夏草や兵どもが夢の跡』も収録。"},

{yr:2025,theme:"百舌鳥・古市古墳群",pts:3,
q:"仁徳天皇陵古墳（大仙陵古墳）は、長さ約（　）mの墳丘を三重の濠で囲む日本最大の前方後円墳である。空欄に入る数字を選びなさい。",
opts:["100","200","500","1,000"],ans:2,
exp:"大仙陵古墳の墳丘長は約486m（約500m）。三重の濠を含めた総面積は約47万㎡で世界最大級の墳墓のひとつ。"},

{yr:2025,theme:"百舌鳥・古市古墳群",pts:3,
q:"古墳時代の埴輪について正しいものはどれか。",
opts:["埴輪は釉薬をかけて焼かれた土製品である。","埴輪は大きく角柱埴輪・形象埴輪に分けられる。","形象埴輪には人物や器物のほか、家や馬を模したものもある。","埴輪は貴重な文化財だが現在国宝・重要文化財に指定されているものはない。"],ans:2,
exp:"埴輪は大きく円筒埴輪と形象埴輪に分類される。形象埴輪には家・船・武具・人物・動物（馬など）を模したものがある。釉薬はかけず素焼き。"},

{yr:2025,theme:"百舌鳥・古市古墳群",pts:3,
q:"出土品に大和政権の雄略天皇と推定できる文字が刻まれていた、埼玉県行田市にある前方後円墳はどれか。",
opts:["稲荷山古墳","江田船山古墳","石舞台古墳","五色塚古墳"],ans:0,
exp:"埼玉県行田市の稲荷山古墳から出土した鉄剣に「獲加多支鹵大王（ワカタケル大王＝雄略天皇）」の文字が確認され、大和政権の支配範囲を示す重要な史料。"},

{yr:2025,theme:"百舌鳥・古市古墳群",pts:4,
q:"岩戸山古墳の被葬者とされる磐井について正しい記述を選びなさい。",
opts:["磐井は瀬戸内海の東部を基盤とした豪族だった。","磐井は6世紀に大和政権に反旗を翻した人物として『日本書紀』に記されている。","磐井の乱は大和政権から派遣された物部守屋によって鎮圧された。","磐井の乱の後、大和政権は九州支配のために鎮西探題を置いた。"],ans:1,
exp:"磐井は筑紫（九州北部）を基盤とした豪族で、527年（6世紀）に大和政権に反乱（磐井の乱）。『日本書紀』に記載あり。鎮圧したのは物部麁鹿火で、守屋ではない。"},

{yr:2025,theme:"百舌鳥・古市古墳群",pts:3,
q:"4世紀後半から6世紀にかけて朝鮮半島に成立していた複数の国家のうち、日本と最も関係が深かった国家として正しいものを選びなさい。",
opts:["高句麗","新羅","百済","高麗"],ans:2,
exp:"百済は倭（日本）と同盟関係を結び、仏教・漢字・儒教・各種技術を伝えた。高麗は10世紀以降の国家で古墳時代には存在しない。"},

{yr:2025,theme:"百舌鳥・古市古墳群",pts:3,
q:"遣唐使に関する記述として正しいものを選びなさい。",
opts:["遣唐使は7世紀から11世紀にかけて日本から中国の唐に派遣された。","遣唐使によって唐の優れた制度・文物が日本に数多くもたらされた。","旅には多少の危険がありつつも遣唐使が遭難することはなかった。","遣唐使に任命された阿倍仲麻呂は唐から帰国した後に聖武天皇に仕えた。"],ans:1,
exp:"遣唐使（630〜894年）は唐の政治制度・仏教・文化・技術を日本に伝えた。遭難例も多く、阿倍仲麻呂は帰国できず唐で没した。"},

{yr:2025,theme:"温泉と歴史",pts:3,
q:"北海道函館市の志苔館跡は15世紀半ばに起きた（　）の蜂起で舞台のひとつとなった。（　）はアイヌの首長で本州から来た和人と対立していたとされる。空欄に入る人名として正しいものはどれか。",
opts:["コシャマイン","シャクシャイン","オニビシ","カモクタイン"],ans:0,

{yr:2025,theme:"温泉と歴史",pts:4,

{yr:2025,theme:"温泉と歴史",pts:3,

{yr:2025,theme:"寛永寺",pts:3,

{yr:2025,theme:"寛永寺",pts:3,

{yr:2025,theme:"江戸時代の地方都市",pts:3,

{yr:2025,theme:"江戸時代の地方都市",pts:4,

{yr:2025,theme:"江戸時代の地方都市",pts:4,

{yr:2025,theme:"薩摩藩の近代工業",pts:3,

{yr:2024,theme:"きぬかけの路",pts:4,

exp:"十返舎一九（1765〜1831年）は滑稽本『東海道中膝栗毛』（1802〜22年刊）の作者。弥次郎兵衛・喜多八の珍道中が人気を博した。"},

{yr:2023,theme:"五街道",pts:3,
q:"松尾芭蕉は俳諧紀行文『おくのほそ道』をのこしたがこの旅で立ち寄っていない（旧）国名について正しいものを選びなさい。",
opts:["下野","常陸","出羽","越後"],ans:3,

{yr:2023,theme:"長崎の蘭学",pts:3,
q:"（a）は長崎に遊学し1838年に大坂に適々斎塾（適塾）を開いた。空欄aに入る人名として正しいものを選びなさい。",
opts:["緒方洪庵","佐久間象山","二宮尊徳","福沢諭吉"],ans:0,
exp:"緒方洪庵（1810〜63年）は蘭方医・蘭学者。大坂に適塾を開き橋本左内・大村益次郎・福沢諭吉らを育てた。コレラ対策や種痘普及にも貢献した。"},

{yr:2023,theme:"長崎の蘭学",pts:3,
q:"高島秋帆はオランダ流の砲術を学び江川太郎左衛門英龍などに伝えた。江川太郎左衛門英龍は伊豆の韮山に（b）を築いた。空欄bに入る語句として正しいものを選びなさい。",
opts:["砲台","造船所","反射炉","紡績工場"],ans:2,
exp:"江川太郎左衛門英龍（1801〜55年）は韮山代官。蘭学・砲術を修め伊豆の韮山に反射炉（1857年竣工、現在世界遺産）を建設し大砲製造を試みた。"},

{yr:2023,theme:"江戸城",pts:4,

exp:"江戸城天守は1657年の明暦の大火（振袖火事）で焼失。その後幕府財政や戦乱のない泰平の世を理由に再建されなかった。"},

{yr:2023,theme:"江戸城",pts:4,
q:"桜田門外の変の舞台となった江戸城の門として正しいものを選びなさい。",

{yr:2023,theme:"松下村塾",pts:3,
q:"松下村塾を主宰した人物として正しいものを選びなさい。",

exp:"吉田松陰（1830〜59年）は長州藩の思想家・教育者。萩（山口県）の松下村塾を主宰し高杉晋作・伊藤博文・山縣有朋らを育てた。安政の大獄で処刑された。"},

{yr:2023,theme:"松下村塾",pts:3,
q:"高杉晋作が1863年に組織した軍事組織の名称として正しいものを選びなさい。",

{yr:2023,theme:"第一次世界大戦後の社会",pts:4,

exp:"第一次世界大戦中（1914〜18年）、欧州列強の生産力が戦争に向かったため日本は繊維・鉄鋼などの輸出が急増し大戦景気に沸いた。"},

{yr:2023,theme:"大正時代の社会",pts:3,

{yr:2023,theme:"大正時代の社会",pts:3,
q:"私鉄に関する説明として正しいものを選びなさい。",

{yr:2023,theme:"関東大震災",pts:3,

opts:["1917年","1920年","1923年","1926年"],ans:2,

{yr:2023,theme:"関東大震災",pts:3,

{yr:2022,theme:"古代",pts:3,

opts:["桓武天皇","持統天皇","推古天皇","天智天皇"],ans:3,

{yr:2022,theme:"万葉歌人",pts:3,

{yr:2022,theme:"奈良",pts:4,

opts:["a 708年　b 唐招提寺　c 橿原神宮","a 710年　b 東大寺　c 春日大社","a 784年　b 法隆寺　c 談山神社","a 794年　b 薬師寺　c 大神神社"],ans:1,

{yr:2022,theme:"石上神宮",pts:4,

{yr:2022,theme:"最澄と空海",pts:4,
q:"最澄と空海に関する説明として正しいものを選びなさい。",
opts:["最澄の開いた天台宗は密教を積極的に摂取したが空海の開いた真言宗は密教をまったく摂取しなかった。","二人は遣唐使の一行として唐に渡っている。しかし空海と最澄とでは唐に渡った年が大きく異なっている。","最澄は小野道風・藤原行成と共に三蹟の一人に、空海は藤原佐理・橘逸勢と共に三筆の一人に数えられている。","最澄の著述には『顕戒論』があり空海には『三教指帰』がある。その内『三教指帰』では儒教・道教・仏教の優劣が論じられている。"],ans:3,
exp:"空海の処女作『三教指帰』（797年）は儒・道・仏の三教を比較論じ仏教の優位を説く。最澄の『顕戒論』は円頓戒の正当性を論じた著作。三筆は空海・橘逸勢・嵯峨天皇、三蹟は小野道風・藤原佐理・藤原行成。"},

{yr:2022,theme:"壇ノ浦",pts:3,

{yr:2022,theme:"承久の乱",pts:3,

opts:["北条時宗","北条時頼","北条泰時","北条義時"],ans:2,

{yr:2022,theme:"空也像",pts:4,

opts:["一遍","空也","源信","親鸞"],ans:1,

{yr:2022,theme:"戦国時代",pts:3,

{yr:2022,theme:"戦国時代",pts:3,

{yr:2022,theme:"戦国時代",pts:3,

{yr:2022,theme:"戦国時代",pts:3,

{yr:2022,theme:"豊臣秀吉",pts:3,
q:"秀吉は1585年朝廷から関白に任じられ翌年には（a）に任じられて豊臣姓を与えられた。空欄aに入る語句として正しいものを選びなさい。",

{yr:2022,theme:"豊臣秀吉",pts:3,

{yr:2022,theme:"江戸時代の関所",pts:3,

q:"近世には松前を拠点として（a）の北前船による海産品の交易が盛んに行われていた。空欄aに入る語句として正しいものを選びなさい。",
opts:["東廻り航路","西廻り航路","南海路","国際航路"],ans:1,
exp:"西廻り航路（北前船航路）は17世紀に河村瑞賢が整備した日本海〜下関〜大坂を結ぶ海上輸送路。蝦夷地・東北の産物を大坂に運ぶ幹線ルートとして繁栄した。"},

{yr:2021,theme:"北前船と北海道",pts:3,
q:"1869年（明治2）年政府は土地の開発・経営にあたる行政機関として（b）を置き蝦夷地を北海道と改称した。空欄bに入る語句として正しいものを選びなさい。",
opts:["北海道庁","北海道事業管理局","開拓使","札幌県"],ans:2,
exp:"開拓使（1869〜82年）は明治政府が北海道開拓のために設置した行政機関。本庁を札幌に置き屯田兵・農業技術者の招致・インフラ整備などを推進した。"},

{yr:2021,theme:"北前船と北海道",pts:3,
q:"札幌農学校出身者として正しいものを選びなさい。",
opts:["石川啄木","宮沢賢治","新渡戸稲造","原　敬"],ans:2,
exp:"新渡戸稲造（1862〜1933年）は札幌農学校第2期生。クラーク博士の影響でキリスト教に入信し後に『武士道』（英文）を著した。国際連盟事務次長も務めた。"},

{yr:2021,theme:"内閣と出来事",pts:4,
q:"内閣総理大臣とその在任中のできごとの組み合わせで正しいものを選びなさい。",
opts:["伊藤博文　下関条約調印","西園寺公望　日英同盟協約調印","桂太郎　シーメンス（ジーメンス）事件","高橋是清　シベリア出兵の開始"],ans:0,
exp:"伊藤博文は1895年（第2次内閣）に日清戦争後の下関条約調印。日英同盟（1902年）は第1次桂太郎内閣。シーメンス事件（1914年）は第1次山本権兵衛内閣でおきた疑獄。シベリア出兵（1918年）は寺内正毅内閣。"},

{yr:2021,theme:"明治の欧州留学",pts:3,
q:"1882年（明治15）年明治政府は伊藤博文らを欧州に派遣し伊藤は（a）流の憲法理論を学んで帰国し憲法制定の準備を進めた。空欄aに入る国名として正しいものを選びなさい。",
opts:["イギリス","フランス","ドイツ","イタリア"],ans:2,
exp:"伊藤博文はドイツ（プロイセン）でグナイスト・シュタインらから君主権の強い憲法理論を学んで帰国。大日本帝国憲法（1889年）はドイツ（プロイセン）憲法を範とした。"},

{yr:2021,theme:"明治の欧州留学",pts:3,
q:"フランスの法学者（b）は来日して日本の各種法典を起草したがこのうち1890年に公布された民法には反対者が出て民法典論争が起こった。空欄bに入る人名として正しいものを選びなさい。",
opts:["グナイスト","モッセ","ボアソナード","クラーク"],ans:2,
exp:"ギュスターヴ・エミール・ボアソナード（1825〜1910年）はフランス人法学者でお雇い外国人。民法・刑法・治罪法などを起草したが民法は「民法出でて忠孝亡ぶ」と批判を受け施行が延期された。"},

{yr:2021,theme:"プロレタリア文学",pts:3,
q:"大正末期から昭和初期の労働運動の高揚にともなって社会矛盾を突いた（a）文学運動がおこった。空欄aに入る語句として正しいものを選びなさい。",
opts:["自然主義","写実主義","モダニズム","プロレタリア"],ans:3,
exp:"プロレタリア文学運動は1920年代後半〜30年代初頭に盛んになった労働者階級の立場からの文学運動。小林多喜二『蟹工船』（1929年）がその代表作。"},

{yr:2021,theme:"プロレタリア文学",pts:3,
q:"悲惨な海上労働を描いた小林多喜二『蟹工船』印刷工場における労働争議を描いた徳永直（b）はその代表的な作品である。空欄bに入る作品名として正しいものを選びなさい。",
opts:["『貧しき人々の群』","『太陽のない街』","『土』","『私の東京地図』"],ans:1,
exp:"徳永直（1899〜1958年）の『太陽のない街』（1929年）は共同印刷争議（1926年）を題材にしたプロレタリア文学の代表作。小林多喜二の『蟹工船』と並ぶ二大作品。"},

// ── 2022年度 追加6問 ──
{yr:2022,theme:"豊臣秀吉",pts:3,
q:"1588年に京都に新築した（b）に後陽成天皇を迎えるなど天皇の権威を利用しながら統一国家をつくりあげていった。空欄bに入る語句として正しいものを選びなさい。",
opts:["後陽成","後醍醐","後水尾","正親町"],ans:0,
exp:"豊臣秀吉は1588年に後陽成天皇の聚楽第行幸を実現し自らの権威を高めた。後陽成天皇（在位1586〜1611年）は安土桃山〜江戸初期の天皇。"},

{yr:2022,theme:"江戸時代の将軍",pts:4,
q:"江戸時代の将軍とその在任中のできごとの組み合わせとして正しいものを選びなさい。",
opts:["徳川家康　禁教令を出しキリスト教を迫害","徳川秀忠　オランダ商館を出島に移す","徳川家光　日本人の海外渡航および帰国の禁止","徳川家綱　島原の乱"],ans:2,
exp:"徳川家光（在任1623〜51年）の在任中に1635年の武家諸法度改訂・参勤交代制度化、鎖国令（1635〜39年）・日本人の海外渡航と帰国の禁止が行われた。"},

{yr:2022,theme:"門前町",pts:3,
q:"戦国時代には商品経済の発展によって城下町だけではなく門前町も繁栄した。門前町として伊勢神宮の宇治・山田、信濃善光寺の長野、延暦寺の門前町で琵琶湖岸の重要な港町でもあった（a）などが代表的である。この地は1997年（平成9）年に重要伝統的建造物群保存地区に選定されている。空欄aに入る場所として正しいものはどれか。",
opts:["坂本","信楽","長浜","彦根"],ans:2,
exp:"長浜（滋賀県）は延暦寺（比叡山）の門前町として発展し琵琶湖の湖港として繁栄した。1997年に重要伝統的建造物群保存地区に選定された。"},

{yr:2022,theme:"室町時代の北山・東山文化",pts:3,
q:"北山文化に関する記述として正しいものを選びなさい。",
opts:["3代将軍足利義政が京都の北山に山荘を建てたことから北山文化と呼ばれる。","金閣の建築様式は平安時代以来の寝殿造と禅宗寺院の禅宗様とを折衷したものである。","南宋にならった五山・十刹の制がほぼ完成し東大寺など禅宗寺院が栄えた。","観阿弥・世阿弥が足利義満の保護を受け芸術性の高い狂言を完成させた。"],ans:1,
exp:"金閣（鹿苑寺）は第1層が寝殿造、第2層が武家造、第3層が禅宗様という折衷建築。3代義満が北山に建てたことから「北山文化」と呼ばれる（義政は8代）。"},

{yr:2022,theme:"室町時代の北山・東山文化",pts:3,
q:"東山文化に関する記述として正しいものを選びなさい。",
opts:["鹿苑寺の東求堂同仁斎にみられる書院造は近代和風住宅の原型といえる。","遣明船で明に渡って作画を学んだ狩野永徳が水墨画の技法を確立した。","京都北野で茶会が開かれ千利休・今井宗久などの茶人が招かれた。","岩石と砂利を組み合わせた枯山水の庭園が造られ禅宗の精神を象徴した。"],ans:0,
exp:"東求堂同仁斎（銀閣寺境内、8代義政建造）の書院造（付書院・違い棚）は現在の和風建築の原型。水墨画の大成は雪舟、北野の茶会は秀吉時代。"},

{yr:2022,theme:"室町時代の民衆文化",pts:2,
q:"室町時代に流行した民衆文化として正しいものを選びなさい。",
opts:["今様","連歌","義太夫節","講談"],ans:1,
exp:"連歌は室町時代に武士・僧侶・庶民にまで広く普及した文芸。複数人が上の句・下の句を付け合う。今様は平安末期、義太夫節・講談は江戸時代に流行した。"},

// ── 2023年度 追加2問 ──
{yr:2023,theme:"応仁の乱",pts:3,

{yr:2023,theme:"江戸の蘭学",pts:3,

// ── 2024年度 追加1問 ──
{yr:2024,theme:"元禄文化",pts:3,

{yr:2020,theme:"江戸幕府",pts:3,

{yr:2020,theme:"江戸幕府",pts:3,

{yr:2020,theme:"忠臣蔵",pts:2,

{yr:2020,theme:"忠臣蔵",pts:2,

{yr:2020,theme:"高度経済成長",pts:2,

{yr:2020,theme:"飛鳥文化",pts:2,

{yr:2020,theme:"飛鳥文化",pts:2,

{yr:2020,theme:"室町時代の文化",pts:3,
q:"北山文化に関する記述として正しいものを選びなさい。",
opts:["3代将軍足利義政が京都の北山に山荘を建てたことから北山文化と呼ばれる。","金閣の建築様式は平安時代以来の寝殿造と禅宗寺院の禅宗様とを折衷したものである。","南宋にならった五山・十刹の制がほぼ完成し東大寺など禅宗寺院が栄えた。","観阿弥・世阿弥が足利義満の保護を受け芸術性の高い狂言を完成させた。"],ans:1,
exp:"金閣（鹿苑寺）は第1層が寝殿造・第2層が武家造・第3層が禅宗様という3様式の折衷建築。3代義満が北山に建てたことから北山文化と呼ばれる（8代義政の時代は東山文化）。"},

{yr:2020,theme:"室町時代の文化",pts:3,
q:"東山文化に関する記述として正しいものを選びなさい。",
opts:["鹿苑寺の東求堂同仁斎にみられる書院造は近代和風住宅の原型といえる。","遣明船で明に渡って作画を学んだ狩野永徳が水墨画の技法を確立した。","京都北野で茶会が開かれ千利休・今井宗久などの茶人が招かれた。","岩石と砂利を組み合わせた枯山水の庭園が造られ禅宗の精神を象徴した。"],ans:3,
exp:"枯山水は水を使わず石・砂・苔で山水を表現する庭園様式で東山文化（8代義政期）を代表する。龍安寺の石庭が有名。書院造の代表は東求堂同仁斎だが設問①の寺院名が誤り（銀閣寺境内）。"},

{yr:2020,theme:"平等院",pts:2,
q:"平等院鳳凰堂を建立した人物の名を選びなさい。",
opts:["藤原道長","藤原緒継","藤原道綱","藤原頼通"],ans:3,
exp:"平等院鳳凰堂（京都府宇治市）は1053年に藤原頼通が父・道長の別荘を寺院に改め建立した。堂内の阿弥陀如来像（定朝作）は10円硬貨・1万円札のデザインに採用。"},

{yr:2020,theme:"山口県",pts:2,
q:"現在の山口市に15世紀頃に戦国武将がつくりはじめた館や町が広がっていたとされる。瑠璃光寺五重塔が象徴的であるこの戦国武将の氏族名を選びなさい。",
opts:["大内氏","菊池氏","島津氏","池田氏"],ans:0,
exp:"大内氏は室町時代に中国地方・九州北部を支配した有力守護大名。山口を「西の京都」として整備し瑠璃光寺五重塔（国宝）などを建立した。"},

{yr:2020,theme:"伊万里焼",pts:2,
q:"伊万里焼に関する記述として正しいものを選びなさい。",
opts:["「伊万里焼」とは朝鮮出兵の際に鍋島直茂が連れ帰った陶工李参平を祖とする磁器の名称で「有田焼」とは全く異なるものである。","1640年代に色絵の技法が伝えられ伊万里焼の技術革新が行われた。上絵付けの技法で赤絵を完成させた酒井田柿右衛門（初代）はその代表的存在である。","伊万里焼は江戸時代初期には海外にも輸出されていたが1639年に出された鎖国令によって国内での流通のみとなった。","佐賀鍋島藩は朝廷や将軍家への献上品（鍋島焼）生産のため藩営の御用窯を作りさらにはその技法が盗まれないよう大川内山の長崎沖の端島に御用窯を移した。"],ans:1,
exp:"酒井田柿右衛門（初代）は17世紀に赤絵（上絵付け）技法を完成させ伊万里焼（有田焼）の技術を革新した。伊万里焼と有田焼は同じもの（伊万里港から積み出したため伊万里焼と呼ばれた）。"},

{yr:2020,theme:"下関",pts:3,
q:"下関市に関する記述として正しいものを選びなさい。",
opts:["奈良時代に和同開珎を鋳造していた吹屋銅山の跡が所在する。","源氏と平氏との最終決戦地であり平氏滅亡の地となった一ノ谷が所在する。","伊藤博文と李鴻章が日朝修好条規を締結した春帆楼が所在する。","関門海峡の海底には1958年に完成した関門国道トンネルが通っている。"],ans:3,
exp:"関門国道トンネルは1958年（昭和33年）開通。日清戦争の講和条約「下関条約」（1895年）を締結した春帆楼も下関にある（李鴻章との交渉だが日朝修好条規ではなく日清講和条約）。"},

{yr:2020,theme:"仁和寺",pts:3,
q:"仁和寺に関する記述として正しいものを選びなさい。",
opts:["聖武天皇の御願寺として造営が開始された寺である。","出家した宇多天皇が寺内の僧房で暮らしたため仁和寺は御室と呼ばれた。","もとは蜂岡寺といい秦氏の氏寺であったとされる。","奇然が中国から持ち帰った釈迦如来像が本尊である。"],ans:1,
exp:"仁和寺（京都市右京区）は888年に宇多天皇が完成させ出家後に御室を設けて住んだことから「御室御所」と呼ばれた。蜂岡寺は広隆寺の旧称。"},

{yr:2020,theme:"熊本城",pts:2,
q:"熊本城に関する記述として正しいものを選びなさい。",
opts:["加藤清正によって新城が築かれ城の完成とともにそれまでの「隈本」が「熊本」に改められたといわれる。","加藤家改易後熊本城主となった細川忠利は佐々木小次郎を客人として招いた。","西南戦争では田原坂より撤退した西郷隆盛軍が熊本城に籠城した。","熊本城天守閣は1933年に国宝に指定されたが文化財保護法改正に伴い1950年に重要文化財に改称された。"],ans:0,
exp:"熊本城は加藤清正が1601年から築城。「隈本」を「熊本」と改称したのも清正。2016年の熊本地震で石垣・天守が大きく損傷し現在も復旧工事が続いている。"},

{yr:2020,theme:"北前船と北海道",pts:3,
q:"蝦夷地と東北地方の物資は北前船に載せて日本海側から下関を廻り大坂などに運ばれた。この日本海側を廻る航路として正しいものを選びなさい。",
opts:["東廻り航路","西廻り航路","南海路","国際航路"],ans:1,
exp:"西廻り航路は河村瑞賢が1671年に整備した日本海沿岸〜下関〜瀬戸内〜大坂を結ぶ海上輸送路。蝦夷地・東北の物産を大坂に運んだ北前船が利用した主要ルート。"},

{yr:2020,theme:"明治の外交",pts:3,
q:"内閣総理大臣とその在任中のできごとの組み合わせで正しいものを選びなさい。",
opts:["伊藤博文　下関条約調印","西園寺公望　日英同盟協約調印","桂太郎　シーメンス事件","高橋是清　シベリア出兵の開始"],ans:0,
exp:"伊藤博文は1895年（第2次内閣）に日清戦争後の下関条約に調印。日英同盟（1902年）は第1次桂太郎内閣。シベリア出兵（1918年）は寺内正毅内閣時。"},

{yr:2020,theme:"明治の憲法",pts:3,
q:"1882年明治政府は伊藤博文らを欧州に派遣し伊藤は（a）流の憲法理論を学んで帰国した。フランスの法学者（b）は来日して日本の各種法典を起草した。空欄a・bに入る正しい組み合わせを選びなさい。",
opts:["a イギリス　b グナイスト","a フランス　b モッセ","a ドイツ　b ボアソナード","a イタリア　b クラーク"],ans:2,
exp:"伊藤博文はドイツ（プロイセン）のグナイスト・シュタインから憲法理論を学んだ。ボアソナード（フランス人）は刑法・民法などを起草したお雇い外国人。"},

{yr:2020,theme:"プロレタリア文学",pts:3,
q:"大正末期から昭和初期にかけて社会矛盾を突いた（a）文学運動がおこった。小林多喜二『蟹工船』印刷工場の労働争議を描いた徳永直（b）はその代表的作品である。空欄a・bに入る正しい組み合わせを選びなさい。",
opts:["a 自然主義　b『貧しき人々の群』","a 写実主義　b『太陽のない街』","a モダニズム　b『土』","a プロレタリア　b『太陽のない街』"],ans:3,
exp:"プロレタリア文学は1920年代後半〜30年代初頭に盛んになった労働者文学運動。小林多喜二『蟹工船』（1929年）と徳永直『太陽のない街』（1929年）が二大作品。"},

{yr:2020,theme:"沖縄返還",pts:2,
q:"1965年以降ベトナム戦争でアメリカが大規模な軍事介入を本格化させると沖縄や日本本土の米軍基地は前線基地となった。沖縄返還協定が調印された年として正しいものを選びなさい。",
opts:["1966年（昭和41年）","1971年（昭和46年）","1976年（昭和51年）","1981年（昭和56年）"],ans:1,
exp:"沖縄返還協定は1971年（昭和46年）6月17日に佐藤栄作首相とニクソン大統領が調印。翌1972年5月15日に沖縄の施政権が日本に返還された。"},

{yr:2020,theme:"防府天満宮",pts:2,
q:"防府天満宮に伝わる菅原道真の生涯に関する絵巻物の名を選びなさい。",
opts:["信貴山縁起絵巻","春日権現記絵","松崎天神縁起絵巻","伴大納言絵巻"],ans:2,
exp:"松崎天神縁起絵巻（防府天満宮蔵・国宝）は菅原道真の生涯と天満宮の縁起を描いた絵巻物（鎌倉時代作）。防府天満宮は道真が最初に神として祀られた天満宮とされる。"},

{yr:2019,theme:"関東の寺社",pts:3,
q:"観音菩薩を本尊とする「浅草寺」のある浅草地区で毎年5月に開催される「三社祭」に関する説明として正しいものを選びなさい。",
opts:["明治天皇・昭憲皇太后を祭神とする「明治神宮」は総面積が伊勢神宮内宮を超え日本一の広さを誇る。","伝教大師最澄を本尊とする「川崎大師（平間寺）」は喜多川歌麿作『東海道五十三次』の一つ「川崎宿」に「八角五重塔」が描かれている。","不動明王を本尊とする「成田山新勝寺」を帰依した初代中村歌右衛門は江戸歌舞伎荒事の代表作「成田山分身不動」を演じ以来「成田屋」が中村宗家の屋号となる。","観音菩薩を本尊とする「浅草寺」のある浅草地区で毎年5月に開催される「三社祭」は浅草寺建立ゆかりの三人を神として祀ったと伝わる浅草神社の例祭である。"],ans:3,
exp:"三社祭は浅草神社（東京都台東区）の例大祭。浅草寺創建に関わった土師真中知・檜前浜成・武成の三人を祭神とする浅草神社の祭礼で毎年5月に開催される。"},

{yr:2019,theme:"奥州藤原氏",pts:3,
q:"奥州藤原氏が根拠地としていた地名として最も適当なものはどれか。",
opts:["胆沢","一関","仙台","平泉"],ans:3,
exp:"平泉（岩手県西磐井郡平泉町）は奥州藤原氏4代約100年の拠点。中尊寺・毛越寺・観自在王院跡などが2011年に世界遺産登録された。"},

{yr:2019,theme:"奥州藤原氏",pts:3,
q:"藤原氏討伐のため28万の大軍を率いて奥州侵攻を行った武将名として最も適当なものはどれか。",
opts:["源義経","源頼朝","源頼家","北条泰時"],ans:1,
exp:"源頼朝は1189年に奥州藤原氏（4代泰衡）を攻め滅ぼした（奥州合戦）。これにより頼朝は全国の武家の頂点に立つ。"},

{yr:2019,theme:"北海道の歴史",pts:2,
q:"日米和親条約に基づいたペリーの箱館来港に関する記述として正しいものを選びなさい。",
opts:["東海道の宿駅「神奈川」の近くで結ばれたことから神奈川条約とも呼ばれる。","横浜、箱館の2港を開いて領事の駐在を認め船の燃料や食料の提供、難破船や乗組員救助の義務を負う。","日本に滞在する米国民には治外法権を認め日本に輸入関税率の決定権がない（関税自主権の欠如）不平等条約である。","アメリカのほかに同様の和親条約を締結した国は、イギリス、フランス、オランダの3か国である。"],ans:1,
exp:"日米和親条約（1854年）は下田・箱館の2港開港、薪水・食料・石炭の補給、漂流民の救助などを定めた。治外法権・関税自主権欠如は1858年の日米修好通商条約の内容。"},

{yr:2019,theme:"北海道の歴史",pts:2,
q:"手宮〜札幌間の官営鉄道が開業した際の旅客輸送以外の重要な輸送物として最も適当なものはどれか。",
opts:["農産品","ニシン","鉄鉱石","石炭"],ans:3,
exp:"官営幌内鉄道（1880年、手宮〜札幌間）は北海道の石炭（幌内炭鉱）を輸送するために建設された。石炭は北海道開発・富国強兵の重要資源だった。"},

{yr:2019,theme:"浮世絵と富嶽三十六景",pts:3,
q:"東京都墨田区にある「すみだ（a）美術館」が収蔵する富嶽三十六景の中で別名「赤富士」と称される作品の正式名はどれか。",
opts:["凱風快晴","御厨川岸より両国橋夕陽見","東海道金谷不二","甲州伊沢暁"],ans:0,
exp:"「凱風快晴」（葛飾北斎・富嶽三十六景）は赤く染まった富士山を描き「赤富士」の愛称で親しまれる。すみだ北斎美術館（東京都墨田区）に所蔵される代表作。"},

{yr:2019,theme:"日光東照宮",pts:3,
q:"日光東照宮に関する記述のうち正しいものはどれか。",
opts:["国宝「陽明門」は建築様式・工芸・彫刻など江戸文化が凝縮された豪華絢爛な建造物で日暮れ時が最も輝いて見えることから別名「日暮の門」と称されている。","「神厩舎」の外壁には人の一生を風刺したと伝えられる八枚の猿の彫刻があり、そのうちの一枚「三猿（見ざる、言わざる、聞かざる）」は広く知られている。","「神奥舎」の外壁には江戸時代に活躍した名工左甚五郎の作と伝えられる「眠り猫」の彫刻がある。","権現造の国宝「御本社」拝殿には左甚五郎の作と伝えられる鏡天井に龍が描かれており拝殿内で拍子木を打つと甲高い音が鳴り響くことから「鳴龍」と称されている。"],ans:0,
exp:"陽明門（日光東照宮・国宝）は江戸初期の装飾建築の最高傑作で「日暮の門」とも呼ばれる。眠り猫は「神厩舎」ではなく「神奥舎」（坂下門）付近、三猿は神厩舎の彫刻。"},

{yr:2019,theme:"江戸時代の改革",pts:3,
q:"8代将軍徳川吉宗が実施した政治改革を指す語句として適当なものはどれか。",
opts:["天保の改革","正徳の治","享保の改革","寛政の改革"],ans:2,
exp:"享保の改革（1716〜45年）は8代将軍徳川吉宗が行った幕政改革。上米の制・公事方御定書の制定・目安箱の設置・新田開発の奨励などを実施し幕府財政を再建した。"},

{yr:2019,theme:"姫路城",pts:3,
q:"姫路城に関する説明で正しいものをすべて選んだ組み合わせを選びなさい。a 1580年代初頭ここを中国地方の毛利氏攻略のための拠点とした羽柴（豊臣）秀吉によって三層の天守閣が築かれた。b 大坂の陣の後に城主となった池田輝政によって今日見られる大規模な城郭に拡張された。c 有力な譜代大名である本多氏、榊原氏、酒井氏による頻繁な城主交代が行われた。",
opts:["aとb","aとc","bとc","aとbとc"],ans:1,
exp:"秀吉が姫路城を拠点に中国攻めを行い三層天守を築いた（a○）。城郭拡張は池田輝政ではなく池田輝政の時代だが「大坂の陣の後」は誤り（池田輝政は1613年没で大坂の陣前）。本多・榊原・酒井による交代は事実（c○）。"},

{yr:2019,theme:"熊野古道",pts:3,
q:"熊野三山（熊野本宮大社・熊野速玉大社・熊野（　）大社）へと通じる参詣道の総称として公式参詣道となっていたのは田辺から熊野三山へと通じる中辺路であった。空欄に入る名称と地図上の位置の正しい組み合わせを選びなさい。",
opts:["高野−ア","勝浦−イ","新宮−ウ","那智−エ"],ans:3,
exp:"熊野三山は熊野本宮大社・熊野速玉大社・熊野那智大社の三社。熊野那智大社（和歌山県東牟婁郡那智勝浦町）は那智の滝を御神体とする。熊野古道は2004年世界遺産登録。"},

{yr:2019,theme:"島根県の観光",pts:3,
q:"島根県の観光地に関する記述の中で正しいものを選びなさい。",
opts:["江戸時代に「たたら鉄」の製造・流通の取り扱いで繁栄した安来の名物「どじょうすくい」は安来の遊女であった「出雲阿国」によって全国に広められた。","出雲大社の創建について『古事記』では天照大神に「国譲り」を行った大国主神の功績を称えて造られた宮殿による、とある。","室町時代に活躍した水墨画家、雪舟の終焉の地、益田にある萬福寺には彼が作ったと伝えられる庭園と涙で描いたといわれる鼠の絵が残されている。","天守が国宝に指定されている松江城は江戸時代有数の茶人としても知られている松平治郷（号は不昧）によって築かれた。"],ans:2,
exp:"雪舟（1420〜1506年）は晩年を山口・益田で過ごし益田の医光寺・万福寺に雪舟作と伝わる庭園が残る。松江城を築いたのは堀尾吉晴（松平治郷は後代の藩主）。"},

{yr:2019,theme:"岡山・後楽園",pts:3,

function saveStats(ok, total){
  try {
    const s = JSON.parse(localStorage.getItem('hq_stats')||'{}');
    s.ok = (s.ok||0) + ok;
    s.total = (s.total||0) + total;
    localStorage.setItem('hq_stats', JSON.stringify(s));
  } catch(e){}
}
function resetAll(){
  if(!confirm('成績をリセットしますか？')) return;
  try { localStorage.removeItem('hq_stats'); } catch(e){}
  loadStats();
}

// year chips
function buildYearChips(){
  const row = document.getElementById('yr-row');
  // 「すべて」チップ
  const all = document.createElement('button');
  all.className = 'yr-chip on';
  all.textContent = 'すべて';
  all.id = 'yr-all';
  all.onclick = () => {
    const isAll = selYears.size === YEARS.length;
    if(isAll){ selYears.clear(); }
    else { YEARS.forEach(y=>selYears.add(y)); }
    updateChips();
  };
  row.appendChild(all);

  YEARS.forEach(yr => {
    const btn = document.createElement('button');
    btn.className = 'yr-chip on';
    btn.textContent = yr+'年';
    btn.dataset.yr = yr;
    btn.onclick = () => {
      if(selYears.has(yr)) selYears.delete(yr);
      else selYears.add(yr);
      updateChips();
    };
    row.appendChild(btn);
  });
}
function updateChips(){
  YEARS.forEach(yr => {
    const btn = document.querySelector('.yr-chip[data-yr="'+yr+'"]');
    if(btn) btn.classList.toggle('on', selYears.has(yr));
  });
  const allBtn = document.getElementById('yr-all');
  if(allBtn) allBtn.classList.toggle('on', selYears.size === YEARS.length);
}

function selMode(m){
  mode = m;
  ['seq','rnd','wrg'].forEach(k => {
    document.getElementById('m-'+k).classList.toggle('sel', k===m);
  });
}

function buildQueue(){
  let base = QS.filter(q => selYears.has(q.yr));
  if(mode === 'wrg'){
    try {
      const wrong = JSON.parse(localStorage.getItem('hq_wrong')||'[]');
      const ws = new Set(wrong);
      const wrArr = base.filter((_,i)=>ws.has(QS.indexOf(_)));
      if(wrArr.length) base = wrArr;
    } catch(e){}
  }
  if(mode === 'rnd'){
    for(let i=base.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [base[i],base[j]]=[base[j],base[i]];
    }
  }
  return base;
}

// ═══ 途中再開機能 ═══
function saveProgress(){
  try {
    const prog = {
      qIndices: queue.map(q => QS.indexOf(q)),
      idx: idx,
      session: session,
      mode: mode,
      selYears: [...selYears]
    };
    localStorage.setItem('hq_progress', JSON.stringify(prog));
  } catch(e){}
}
function clearProgress(){
  try { localStorage.removeItem('hq_progress'); } catch(e){}
}
function loadProgress(){
  try {
    const raw = localStorage.getItem('hq_progress');
    if(!raw) return null;
    return JSON.parse(raw);
  } catch(e){ return null; }
}
function checkResume(){
  const prog = loadProgress();
  if(!prog || prog.qIndices.length === 0) return;
  const remaining = prog.qIndices.length - prog.idx;
  if(remaining <= 0){ clearProgress(); return; }
  if(confirm('前回の途中（'+(prog.idx+1)+' / '+prog.qIndices.length+'問目）から再開しますか？\n「キャンセル」で最初から始めます。')){
    queue = prog.qIndices.map(i => QS[i]).filter(Boolean);
    idx = prog.idx;
    session = prog.session;
    show('quiz');
    renderQ();
  } else {
    clearProgress();
  }
}

function startQuiz(){
  queue = buildQueue();
  if(!queue.length){ alert('出題する問題がありません。年度を選択してください。'); return; }
  idx = 0;
  session = {ok:0, ng:0, pts:0, maxPts:0, hist:[]};
  clearProgress();
  show('quiz');
  renderQ();
}

function show(id){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  window.scrollTo(0,0);
}
function goHome(){ show('home'); }

function renderQ(){
  const q = queue[idx];
  const total = queue.length;
  const pct = Math.round(idx/total*100);
  document.getElementById('pfill').style.width = pct+'%';
  document.getElementById('ptxt').textContent = (idx+1)+' / '+total;
  document.getElementById('pts-b').textContent = q.pts+'点';

  const body = document.getElementById('q-body');
  body.innerHTML = '<div class="q-meta"><span class="badge yr">'+q.yr+'年度</span><span class="badge th">'+q.theme+'</span></div><div class="q-txt">'+q.q+'</div><div class="opts" id="opts"></div><div class="fb" id="fb"><div class="fb-top"><span class="fb-lbl" id="fb-lbl"></span></div><div class="fb-exp" id="fb-exp"></div><div id="wiki-area" style="margin-top:8px"></div></div><button class="next on" id="next-btn" style="display:none" onclick="nextQ()">次の問題 →</button>';

  const opts = document.getElementById('opts');
  q.opts.forEach((o,i)=>{
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = ['①','②','③','④'][i]+' '+o;
    btn.onclick = () => answer(i, btn);
    opts.appendChild(btn);
  });
}

function answer(chosen, btn){
  const q = queue[idx];
  const correct = q.ans;
  const isOk = chosen === correct;

  // disable all
  document.querySelectorAll('.opt').forEach((b,i)=>{
    b.disabled = true;
    if(i===correct) b.classList.add('ok');
    else if(i===chosen && !isOk) b.classList.add('ng');
  });

  // feedback
  const fb = document.getElementById('fb');
  const lbl = document.getElementById('fb-lbl');
  const exp = document.getElementById('fb-exp');
  fb.className = 'fb on ' + (isOk?'fb-ok':'fb-ng');
  lbl.textContent = isOk ? '✓ 正解！' : '✗ 不正解';
  exp.textContent = q.exp;

  // score
  if(isOk){ session.ok++; session.pts += q.pts; }
  else { session.ng++; }
  session.maxPts += q.pts;
  session.hist.push({q:q.q.slice(0,30), ok:isOk});

  // wrong list
  try {
    const gi = QS.indexOf(q);
    const wrong = JSON.parse(localStorage.getItem('hq_wrong')||'[]');
    const ws = new Set(wrong);
    if(isOk) ws.delete(gi); else ws.add(gi);
    localStorage.setItem('hq_wrong', JSON.stringify([...ws]));
  } catch(e){}

  document.getElementById('next-btn').style.display = 'block';
}

function nextQ(){
  idx++;
  saveProgress();
  if(idx >= queue.length){ showResult(); return; }
  renderQ();
  window.scrollTo(0,0);
}

function showResult(){
  clearProgress();
  saveStats(session.ok, session.ok+session.ng);
  loadStats();

  const total = session.ok + session.ng;
  const rate = Math.round(session.ok/total*100);
  const pct = Math.round(session.pts/session.maxPts*100);

  document.getElementById('r-sc').textContent = session.pts;
  document.getElementById('r-max').textContent = session.maxPts;
  document.getElementById('r-ok').textContent = session.ok;
  document.getElementById('r-ng').textContent = session.ng;
  document.getElementById('r-rt').textContent = rate+'%';
  document.getElementById('r-pt').textContent = pct+'%';

  const msgs = ['もう少し！復習しましょう','半分超えました！','なかなか好調！','合格圏！','満点です！\u{1F389}'];
  document.getElementById('r-msg').textContent = msgs[Math.min(4,Math.floor(pct/20))];

  const hist = document.getElementById('hist');
  hist.innerHTML = '';
  session.hist.forEach((h,i)=>{
    const d = document.createElement('div');
    d.className = 'hi';
    d.innerHTML = '<span class="hi-n">問'+(i+1)+'</span><span class="hi-q">'+h.q.slice(0,28)+'…</span><span class="hi-r">'+(h.ok?'✅':'❌')+'</span>';
    hist.appendChild(d);
  });

  document.getElementById('pfill').style.width = '100%';
  document.getElementById('ptxt').textContent = queue.length+' / '+queue.length;
  show('result');
}

// ═══ フラグ機能 ═══
function getFlagSet(){
  try{ return new Set(JSON.parse(localStorage.getItem('hq_flags')||'[]')); }catch(e){ return new Set(); }
}
function saveFlagSet(s){
  try{ localStorage.setItem('hq_flags', JSON.stringify([...s])); }catch(e){}
}
function getQueueIdx(){
  return QS.indexOf(queue[idx]);
}
function toggleFlag(){
  const gi = getQueueIdx();
  const flags = getFlagSet();
  const btn = document.getElementById('flag-btn');
  if(flags.has(gi)){
    flags.delete(gi);
    btn.textContent = '☆';
    btn.title = 'フラグを立てる';
  } else {
    flags.add(gi);
    btn.textContent = '\u{1F6A9}';
    btn.title = 'フラグを外す';
  }
  saveFlagSet(flags);
}
function updateFlagBtn(){
  const gi = getQueueIdx();
  const flags = getFlagSet();
  const btn = document.getElementById('flag-btn');
  if(btn){
    btn.textContent = flags.has(gi) ? '\u{1F6A9}' : '☆';
    btn.title = flags.has(gi) ? 'フラグを外す' : 'フラグを立てる';
  }
}

// ═══ フラグ一覧画面 ═══
function showFlagged(){
  const flags = getFlagSet();
  const list = document.getElementById('fl-list');
  const startBtn = document.getElementById('fl-start-btn');
  list.innerHTML = '';
  if(flags.size === 0){
    list.innerHTML = '<div class="fl-empty">フラグした問題はありません<br><br>問題を解きながら☆をタップするとここに追加されます</div>';
    startBtn.style.display = 'none';
  } else {
    flags.forEach(gi => {
      const q = QS[gi];
      if(!q) return;
      const d = document.createElement('div');
      d.className = 'fl-item';
      d.innerHTML = '<div class="fl-item-q"><div>'+q.q.slice(0,60)+'…</div><div class="fl-item-meta">'+q.yr+'年度 ／ '+q.theme+' ／ '+q.pts+'点</div></div><button class="fl-unflag" onclick="unflagItem('+gi+')" title="フラグを外す">✕</button>';
      list.appendChild(d);
    });
    startBtn.style.display = 'block';
    startBtn.textContent = 'フラグ問題を練習する（'+flags.size+'問）';
  }
  show('flagged');
}
function unflagItem(gi){
  const flags = getFlagSet();
  flags.delete(gi);
  saveFlagSet(flags);
  showFlagged();
}
function startFlagged(){
  const flags = getFlagSet();
  if(flags.size === 0){ alert('フラグした問題がありません'); return; }
  queue = [...flags].map(gi => QS[gi]).filter(Boolean);
  idx = 0;
  session = {ok:0, ng:0, pts:0, maxPts:0, hist:[]};
  show('quiz');
  renderQ();
}

// ═══ Wiki検索 ═══
function openWiki(term){
  const url = 'https://ja.wikipedia.org/wiki/' + encodeURIComponent(term);
  window.open(url, '_blank');
}
function buildWikiButtons(expText){
  // 解説テキストから固有名詞を抽出してWikiボタンを生成
  const terms = extractTerms(expText);
  const area = document.getElementById('wiki-area');
  if(!area) return;
  area.innerHTML = '';
  if(terms.length === 0) return;
  const label = document.createElement('div');
  label.style.cssText = 'font-size:11px;color:#8e8e93;margin-bottom:4px';
  label.textContent = 'Wikipediaで調べる：';
  area.appendChild(label);
  const row = document.createElement('div');
  row.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px';
  terms.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'wiki-btn';
    btn.innerHTML = '\u{1F50D} ' + t;
    btn.onclick = () => openWiki(t);
    row.appendChild(btn);
  });
  area.appendChild(row);
}
function extractTerms(text){
  // 人名・地名・建物名・事件名を正規表現で抽出
  const patterns = [
    /[ぁ-んァ-ン一-龯]{2,}(?:天皇|上皇|将軍|藩主|大臣|大師|法師|上人)/g,
    /[ぁ-んァ-ン一-龯]{2,}(?:の乱|の役|の変|の戦い|合戦)/g,
    /[ぁ-んァ-ン一-龯]{2,}(?:寺|神社|神宮|城|宮|殿|閣)/g,
    /[ぁ-んァ-ン一-龯]{2,}(?:条約|法|令|制度)/g,
    /[一-龯]{2,4}(?:斉彬|頼通|義満|清盛|道真|信長|秀吉|家康|義経|頼朝)/g,
  ];
  const found = new Set();
  patterns.forEach(p => {
    const m = text.match(p);
    if(m) m.forEach(t => { if(t.length >= 3 && t.length <= 12) found.add(t); });
  });
  // 「」内の語句も抽出
  const quoted = text.match(/[『「]([^』」]{2,15})[』」]/g);
  if(quoted) quoted.forEach(q => found.add(q.replace(/[『「』」]/g,'')));
  return [...found].slice(0, 6);
}

// ═══ renderQの後にフラグ状態とWikiを初期化 ═══
const _origRenderQ = renderQ;
renderQ = function(){
  _origRenderQ();
  updateFlagBtn();
};

// ═══ answerの後にWikiボタンを生成 ═══
const _origAnswer = answer;
answer = function(chosen, btn){
  _origAnswer(chosen, btn);
  const q = queue[idx];
  buildWikiButtons(q.exp);
};

// init
buildYearChips();
loadStats();
selMode('seq');
checkResume();
</script>
